<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能站点雷达 - 黄金辉vibe coding 开发</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://map.qq.com/api/gljs?v=1.exp&key=WJABZ-IC5LI-GLBG5-UA7DS-TU3SS-QVBMG"></script>
    
    <style>
        :root {
            --primary: #00f2ea;
            --secondary: #ff0050;
            --bg-dark: #0f0c29;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 8s ease-in-out infinite;
        }
        .blob-1 { width: 400px; height: 400px; background: rgba(0, 242, 234, 0.15); top: -100px; left: -100px; }
        .blob-2 { width: 500px; height: 500px; background: rgba(255, 0, 80, 0.1); bottom: -150px; right: -150px; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.1); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border-color: rgba(0, 242, 234, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 242, 234, 0.1);
        }

        input[type="text"], input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 234, 0.2);
        }
        input[type="file"]::file-selector-button {
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
        }
        input[type="file"]::file-selector-button:hover {
            background: rgba(0, 242, 234, 0.2);
        }

        .btn-gradient {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            background-size: 200% 200%;
            animation: gradient-shift 3s ease infinite;
            border: none;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 234, 0.3);
        }
        .btn-gradient:active { transform: translateY(0); }
        .btn-gradient:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .result-item {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s forwards;
        }
        .result-item:nth-child(1) { animation-delay: 0.1s; }
        .result-item:nth-child(2) { animation-delay: 0.2s; }
        .result-item:nth-child(3) { animation-delay: 0.3s; }
        .result-item:nth-child(4) { animation-delay: 0.4s; }
        .result-item:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
            transition: width 0.3s linear;
        }

        .dev-badge {
            background: linear-gradient(90deg, rgba(0,242,234,0.1), rgba(255,0,80,0.1));
            border-left: 3px solid var(--primary);
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start py-10 px-4">

    <!-- 动态背景 -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <!-- 开发者标识 -->
    <div class="dev-badge text-xs text-gray-400 px-4 py-2 rounded-r-full mb-6 tracking-widest">
        POWERED BY 黄金辉vibe coding 开发
    </div>

    <!-- 主容器 -->
    <div class="w-full max-w-2xl space-y-6">
        
        <!-- 标题 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-[#00f2ea] to-[#ff0050]">
                智能站点雷达
            </h1>
            <p class="mt-3 text-gray-400 text-sm tracking-wide">基于腾讯地图API · Haversine核心算法 · 极速距离解析</p>
        </header>

        <!-- Step 1: 文件上传与验证 -->
        <section class="glass-card rounded-2xl p-6">
            <div class="flex items-center mb-4">
                <span class="flex items-center justify-center w-8 h-8 rounded-full bg-[#00f2ea] text-black font-bold text-sm mr-3">1</span>
                <h2 class="text-lg font-semibold">导入站点数据</h2>
            </div>
            <input type="file" id="excelFile" accept=".xlsx, .xls" class="w-full text-sm text-gray-300 file:mr-4 file:py-2 file:px-4 rounded-lg cursor-pointer">
            
            <!-- 文件预览 -->
            <div id="filePreview" class="hidden mt-4 p-4 bg-gray-800/50 rounded-lg">
                <h3 class="text-sm font-semibold mb-2 text-[#00f2ea]">文件预览</h3>
                <div id="previewContent" class="text-xs text-gray-400 space-y-1"></div>
                <div class="mt-3 flex items-center text-xs">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                    <span>✓ 必填列：站点具体位置（误差不超过100米）</span>
                </div>
            </div>
            
            <!-- 加载覆盖层 -->
            <div id="loadingOverlay" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
                <div class="bg-gray-900 p-8 rounded-2xl text-center">
                    <div class="loading-spinner mx-auto mb-4"></div>
                    <h3 class="text-lg font-bold mb-2">正在解析Excel</h3>
                    <div class="text-sm text-gray-400">
                        <div>已处理：<span id="processedRows">0</span> / <span id="totalRows">0</span> 行</div>
                        <div>API调用：<span id="apiCalls">0</span> 次</div>
                    </div>
                    <div class="mt-4 w-64 bg-gray-700 rounded-full h-2">
                        <div id="progressBar" class="bg-[#00f2ea] h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Step 2: 目标地址 -->
        <section class="glass-card rounded-2xl p-6">
            <div class="flex items-center mb-4">
                <span class="flex items-center justify-center w-8 h-8 rounded-full bg-[#ff0050] text-white font-bold text-sm mr-3">2</span>
                <h2 class="text-lg font-semibold">输入目标地址</h2>
            </div>
            <input type="text" id="targetAddress" placeholder="例如：北京市海淀区中关村大街1号" class="w-full px-4 py-3 rounded-lg text-sm">
        </section>

        <!-- 执行按钮 -->
        <button id="startBtn" onclick="startAnalysis()" class="btn-gradient w-full py-4 rounded-2xl text-lg shadow-lg">
            开始雷达扫描
        </button>

        <!-- 数据就绪指示器 -->
        <div id="dataReadyIndicator" class="hidden fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg z-50">
            <div class="flex items-center">
                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                </svg>
                数据就绪！可开始查询
            </div>
        </div>

        <!-- 结果展示区 -->
        <section id="resultSection" class="glass-card rounded-2xl p-6 hidden border-[#00f2ea]/30">
            <h2 class="text-xl font-bold mb-5 text-[#00f2ea] flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                最近站点匹配结果
            </h2>
            
            <div class="space-y-4">
                <div class="result-item flex justify-between items-center border-b border-gray-700/50 pb-3">
                    <span class="text-gray-400 text-sm">站点名称</span>
                    <span id="resName" class="font-semibold text-lg text-white">-</span>
                </div>
                <div class="result-item flex justify-between items-start border-b border-gray-700/50 pb-3">
                    <span class="text-gray-400 text-sm mt-1">具体位置</span>
                    <span id="resAddr" class="font-medium text-right text-sm text-gray-300 max-w-[60%]">-</span>
                </div>
                <div class="result-item flex justify-between items-center border-b border-gray-700/50 pb-3">
                    <span class="text-gray-400 text-sm">站长姓名</span>
                    <span id="resMaster" class="font-medium text-white">-</span>
                </div>
                <div class="result-item flex justify-between items-center border-b border-gray-700/50 pb-3">
                    <span class="text-gray-400 text-sm">联系电话</span>
                    <a id="resPhone" href="tel:" class="font-mono text-[#00f2ea] hover:underline">-</a>
                </div>
                <div class="result-item flex justify-between items-center pt-2">
                    <span class="text-gray-400 text-sm">直线距离</span>
                    <span id="resDist" class="text-2xl font-extrabold text-[#ff0050]">-</span>
                </div>
            </div>
        </section>

        <!-- 下载按钮 -->
        <button id="downloadBtn" onclick="downloadUpdatedExcel()" class="hidden btn-gradient w-full py-3 rounded-2xl text-base shadow-lg">
            下载更新后的Excel文件
        </button>

    </div>

    <!-- 底部版权 -->
    <footer class="mt-16 mb-8 text-center text-gray-600 text-xs tracking-wider">
        &copy; 2025 黄金辉vibe coding 开发 · 腾讯地图API驱动
    </footer>

<script>
    let stationCache = []; // 存储处理后的站点数据
    let isPrepared = false;

    // 延时函数 (用于API限流：每秒5次 = 200ms间隔)
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // 检查腾讯地图API是否加载成功
    function checkTencentMapAPI() {
        if (typeof qq === 'undefined' || !qq.maps || !qq.maps.Geocoder) {
            alert("腾讯地图 JS API 加载失败！\n原因通常是：当前网页的域名未加入API密钥的白名单。\n请前往腾讯地图控制台修改 Key 的 WebServiceAPI 白名单设置。");
            return false;
        }
        return true;
    }

    // 监听文件上传
    document.getElementById('excelFile').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        isPrepared = false;
        stationCache = [];
        document.getElementById('resultSection').classList.add('hidden');
        document.getElementById('downloadBtn').classList.add('hidden');
        
        const overlay = document.getElementById('loadingOverlay');
        const preview = document.getElementById('filePreview');
        const previewContent = document.getElementById('previewContent');
        
        try {
            overlay.classList.remove('hidden');
            
            const data = await parseExcel(file);
            if (!validateExcelStructure(data)) {
                overlay.classList.add('hidden');
                return;
            }
            
            // 显示预览
            preview.classList.remove('hidden');
            previewContent.innerHTML = `
                <div>总行数：${data.length}</div>
                <div>必填列：站点具体位置（误差不超过100米）</div>
                <div>可选列：站点名称、站长姓名、站长电话</div>
            `;
            
            const total = data.length;
            let processed = 0;
            let apiCalls = 0;
            
            // 处理数据
            for (let i = 0; i < data.length; i++) {
                const row = data[i];
                const addr = row['站点具体位置（误差不超过100米）'];
                
                if (!addr) continue; // 跳过无地址的行
                
                let lat = parseFloat(row['latitude']);
                let lng = parseFloat(row['longitude']);
                
                if (isNaN(lat) || isNaN(lng)) {
                    // 需要API解析
                    if (checkTencentMapAPI()) {
                        const geocoder = new qq.maps.Geocoder();
                        await new Promise((resolve) => {
                            geocoder.getLocation(addr, function(result) {
                                if (result && result.status === 0) {
                                    row.latitude = result.location.lat;
                                    row.longitude = result.location.lng;
                                } else {
                                    console.warn(`解析失败: ${addr}`);
                                }
                                processed++;
                                apiCalls++;
                                updateProgress(processed, total, apiCalls);
                                resolve();
                            });
                        });
                        await sleep(250); // 限流
                    }
                } else {
                    processed++;
                    updateProgress(processed, total, apiCalls);
                }
            }
            
            // 过滤有效数据
            stationCache = data.filter(row => 
                row['站点具体位置（误差不超过100米）'] && 
                !isNaN(parseFloat(row['latitude'])) && 
                !isNaN(parseFloat(row['longitude']))
            );
            
            overlay.classList.add('hidden');
            previewContent.innerHTML += `<div class="mt-2 text-[#00f2ea]">✓ 有效站点: ${stationCache.length} 个</div>`;
            
            if (stationCache.length > 0) {
                onDataReady();
            } else {
                alert("未找到有效站点数据！");
            }
            
        } catch (error) {
            console.error(error);
            overlay.classList.add('hidden');
            alert("文件解析出错，请检查格式是否符合要求。");
        }
    });

    // 解析Excel文件
    function parseExcel(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    resolve(XLSX.utils.sheet_to_json(worksheet, { defval: "" }));
                } catch (error) {
                    reject(error);
                }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    // 验证Excel结构
    function validateExcelStructure(data) {
        if (!data || data.length === 0) {
            alert("Excel文件中没有数据！");
            return false;
        }
        
        const requiredColumns = ['站点具体位置（误差不超过100米）'];
        const headers = Object.keys(data[0] || {});
        
        const missing = requiredColumns.filter(col => !headers.includes(col));
        if (missing.length > 0) {
            alert(`文件格式错误！缺少必需列：${missing.join('、')}`);
            return false;
        }
        
        return true;
    }

    // 更新进度
    function updateProgress(processed, total, apiCalls) {
        document.getElementById('processedRows').textContent = processed;
        document.getElementById('totalRows').textContent = total;
        document.getElementById('apiCalls').textContent = apiCalls;
        document.getElementById('progressBar').style.width = `${(processed/total)*100}%`;
    }

    // 数据就绪通知
    function onDataReady() {
        const indicator = document.getElementById('dataReadyIndicator');
        indicator.classList.remove('hidden');
        
        setTimeout(() => {
            indicator.classList.add('hidden');
        }, 3000);
        
        document.getElementById('startBtn').disabled = false;
        document.getElementById('startBtn').classList.remove('opacity-50', 'cursor-not-allowed');
    }

    // Haversine 公式 (单位：米)
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // 开始分析
    async function startAnalysis() {
        if (!isPrepared || stationCache.length === 0) {
            alert("请先上传并成功解析 Excel 文件！");
            return;
        }
        const targetAddr = document.getElementById('targetAddress').value.trim();
        if (!targetAddr) {
            alert("请输入目标地址！");
            return;
        }
        if (!checkTencentMapAPI()) return;

        const btn = document.getElementById('startBtn');
        btn.disabled = true;
        btn.innerText = "雷达扫描中...";

        try {
            // 1. 解析目标地址
            const targetLoc = await new Promise((resolve, reject) => {
                const geocoder = new qq.maps.Geocoder();
                geocoder.getLocation(targetAddr, function(result) {
                    if (result && result.status === 0) resolve({ lat: result.location.lat, lng: result.location.lng });
                    else reject("目标地址解析失败，请检查地址是否正确！");
                });
            });

            // 2. 计算距离
            let minDistance = Infinity;
            let closestStation = null;

            for (const station of stationCache) {
                const dist = calculateDistance(targetLoc.lat, targetLoc.lng, station.latitude, station.longitude);
                if (dist < minDistance) {
                    minDistance = dist;
                    closestStation = station;
                }
            }

            // 3. 显示结果
            if (closestStation) {
                const distText = minDistance > 1000 ? (minDistance / 1000).toFixed(2) + ' km' : Math.round(minDistance) + ' m';
                
                document.getElementById('resName').innerText = closestStation['站点名称'] || '未知站点';
                document.getElementById('resAddr').innerText = closestStation['站点具体位置（误差不超过100米）'];
                document.getElementById('resMaster').innerText = closestStation['站长姓名'] || '未知';
                
                const phoneEl = document.getElementById('resPhone');
                phoneEl.innerText = closestStation['站长电话'] || '-';
                phoneEl.href = `tel:${closestStation['站长电话'] || ''}`;
                
                document.getElementById('resDist').innerText = distText;
                
                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('downloadBtn').classList.remove('hidden');
                document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // 重新触发动画
                document.getElementById('resultSection').querySelectorAll('.result-item').forEach(el => {
                    el.style.animation = 'none';
                    el.offsetHeight;
                    el.style.animation = null;
                });
            } else {
                alert("未找到任何有效站点数据！");
            }

        } catch (error) {
            alert(error);
        } finally {
            btn.disabled = false;
            btn.innerText = "开始雷达扫描";
        }
    }

    // 下载更新后的Excel
    function downloadUpdatedExcel() {
        if (stationCache.length === 0) return;
        
        // 转换数据格式
        const updatedData = stationCache.map(station => ({
            '区域': station['区域'] || '',
            '城市': station['城市'] || '',
            '站点名称': station['站点名称'] || '',
            '站点具体位置（误差不超过100米）': station['站点具体位置（误差不超过100米）'],
            'longitude': station['longitude'] || station['longitude'] || '',
            'latitude': station['latitude'] || station['latitude'] || '',
            '站长姓名': station['站长姓名'] || '',
            '站长电话': station['站长电话'] || ''
        }));
        
        // 创建工作簿
        const ws = XLSX.utils.json_to_sheet(updatedData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "站点数据");
        
        // 生成并下载
        const filename = `站点数据_${new Date().toISOString().slice(0,10)}.xlsx`;
        XLSX.writeFile(wb, filename);
    }

    // 监听回车键
    document.getElementById('targetAddress').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') startAnalysis();
    });

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('startBtn').disabled = true;
        document.getElementById('startBtn').classList.add('opacity-50', 'cursor-not-allowed');
    });
</script>

</body>
</html>
